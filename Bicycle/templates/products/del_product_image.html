{% extends 'base/base.html' %}

{% block title %}
Delete Product Image
{% endblock %}


{% block content %}
<section class="w-50">
    <img src="{{product_image.image.url}}" alt="" class="w-100">
</section>
<section>
    <div class="card">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <button type="submit" class="btn btn-danger">Confirm delete</button>
        </form>
    </div>
</section>
{% endblock %}
