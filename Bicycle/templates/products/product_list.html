{% extends 'base/base.html' %}

{% block title %}
Products
{% endblock %}

{% block content %}

<!-- Fix for fixed header overlap -->
<div class="container-fluid pt-5 mt-3">

    <!-- Top Action -->
     
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">Products</h3>

        {% if user.is_staff %}
        <a href="{% url 'add_product' %}" class="btn btn-success">
            + Add Product
        </a>
        {% endif %}
    </div>

    <!-- Cards Grid -->
    {% include 'products/includes/productsSection.html' %}

</div>

{% endblock %}
